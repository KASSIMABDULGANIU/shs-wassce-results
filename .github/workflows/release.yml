name: Build and Release

# Triggers when you push a tag like "v1.0.1"
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          iscc setup.iss
          if not exist Output\SHSWassceResultsMgt-Setup-1.0.0.exe exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output\SHSWassceResultsMgt-Setup-1.0.0.exe
          body: "Automated release for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
